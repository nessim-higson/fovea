<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOVEA</title>
<link rel="stylesheet" href="css/site.css">
</head>
<body>

<canvas id="gl"></canvas>
<div id="spacer"></div>

<div class="overlay">
  <button class="metro" id="metro" aria-label="Pause motion"><span id="metro-label"></span></button>

  <div class="detail" id="detail" hidden>
    <button class="detail-x" id="detail-x" aria-label="Close project">&#10005;</button>
    <div class="detail-meta" id="detail-meta"></div>
    <p class="detail-desc" id="detail-desc"></p>
  </div>

  <button class="lens-btn" id="lens-btn">Lens: on</button>
  <button class="sound-btn" id="sound-btn">Sound: off</button>
  <button class="index-btn" id="works-btn">Works</button>
  <button class="view-btn" id="view-btn" hidden></button>
  <div class="hint">G — effects panel</div>
  <div class="version" id="version">V.32</div>
  <div class="beat-dot" id="beat-dot" aria-hidden="true"></div>
</div>

<div class="works-bed" id="works-bed" hidden></div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.160.0",
    "lil-gui": "https://esm.sh/lil-gui@0.19.2"
  }
}
</script>
<script type="module" src="js/app.js?v=32"></script>
</body>
</html>
