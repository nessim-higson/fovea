<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOVEA — works grid</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{ --mono:"SF Mono",ui-monospace,Menlo,monospace; }
  html,body{height:100%;background:#000;color:#fff;font-family:var(--mono);overflow:hidden;}
  #stage{position:fixed;inset:0;overflow:hidden;}
  #gl{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;cursor:default;}
  #gl.hot{cursor:pointer;}

  .square{position:absolute;left:18px;top:18px;width:60px;height:60px;background:#fff;color:#111;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;
    letter-spacing:.08em;z-index:9;user-select:none;}
  .title{position:absolute;left:50%;top:24px;transform:translateX(-50%);z-index:9;
    font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.85);}
  .hint{position:absolute;right:20px;top:24px;z-index:9;font-size:10px;letter-spacing:.16em;
    text-transform:uppercase;color:rgba(255,255,255,.45);}
  /* hovered tile caption — follows the cursor's tile */
  .cap{position:absolute;z-index:8;pointer-events:none;transform:translate(-50%,0);
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;text-align:center;
    color:#fff;text-shadow:0 2px 12px #000;opacity:0;transition:opacity .2s;white-space:nowrap;}
  .cap .yr{display:block;font-size:9px;letter-spacing:.18em;color:rgba(255,255,255,.6);margin-top:3px;}
  .toggle{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);z-index:9;display:flex;gap:6px;}
  .toggle button{font:inherit;font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:rgba(255,255,255,.5);background:transparent;border:0;padding:6px 13px;border-radius:999px;cursor:pointer;}
  .toggle button.on{background:rgba(255,255,255,.92);color:#000;}
  .back{position:absolute;left:18px;bottom:18px;z-index:9;font-size:10px;letter-spacing:.16em;
    text-transform:uppercase;color:rgba(255,255,255,.5);text-decoration:none;}
  .back:hover{color:#fff;}
  .flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:20;}
  .flash.go{animation:fl .6s ease;}
  @keyframes fl{0%{opacity:.85}100%{opacity:0}}
</style>
</head>
<body>
<div id="stage">
  <canvas id="gl"></canvas>
  <div class="square">IAAH</div>
  <div class="title">Works</div>
  <div class="hint">hover · click to enter</div>
  <div class="cap" id="cap"></div>
  <div class="toggle">
    <button data-cat="Commercial" class="on">Commercial</button>
    <button data-cat="Personal">Personal</button>
  </div>
  <a class="back" href="./">← comps</a>
  <div class="flash" id="flash"></div>
</div>

<script>
const P = [
  ['GRISELDA','Commercial','griselda',2024],['FINESTKIND','Commercial','finestkind',2023],
  ['SQSP REBRAND','Commercial','sqsp-rebrand',2023],['THE TRIAL','Commercial','the-trial',2023],
  ['WETRANSFER X OUTERNET','Commercial','wetransfer-x-outernet',2022],['BURIAL','Commercial','burial',2021],
  ['KATLA','Commercial','katla',2021],['HOW TO SELL DRUGS ONLINE FAST','Commercial','how-to-sell-drugs-online-fast',2020],
  ['QUEENS GAMBIT','Commercial','queens-gambit',2020],['GRAND ARMY','Commercial','grand-army',2020],
  ['DEAD MEN','Commercial','dead-men',2019],['SPEAK YOUR MIND','Commercial','speak-your-mind',2018],
  ['SQSP. MAKE IT.','Commercial','squarespace-make-itt',2018],['SQUARESPACE — BUILD IT BEAUTIFUL','Commercial','squarespace-build-it-beautiful',2017],
  ['SPIDERMAN','Commercial','spiderman',2012],['YOUNG GUNS 9','Commercial','young-guns-9',2011],
  ['ALPHABET SOUP','Personal','alphabet-soup',2023],['BODY TYPE','Personal','body-type',2022],
  ['IAAH REEL 2024','Personal','iaah-reel-2024',2024],['MOVEMENT','Personal','movement',2021],
  ['NEUE FASHION','Personal','neue-fashion',2020],['THE CRITERION COLLECTION','Personal','the-criterion-collection',2019],
  ['THE LAST OF US','Personal','the-last-of-us',2020],['TYPE AS FORM','Personal','type-as-form',2019],
  ['IAAH HEADERS','Personal','iaah-headers',2018],
].map(([client,cat,slug,year])=>({client,cat,slug,year,img:`../../content/iaah/${slug}/00.jpg`}));

const cv=document.getElementById('gl'), cap=document.getElementById('cap');
const gl=cv.getContext('webgl',{antialias:true});
const VS=`attribute vec2 aUV;uniform vec4 uRect;varying vec2 vUv;
void main(){vUv=aUV;gl_Position=vec4(uRect.xy+aUV*uRect.zw,0.,1.);}`;
// per-tile lens-tunnel: a gentle barrel by default, deep fisheye on hover
const FS=`precision highp float;varying vec2 vUv;
uniform sampler2D uTex;uniform vec2 uCov;uniform float uHover,uAlpha;
const float TS=0.4;
vec2 fit(vec2 c,vec2 cov){return (c-0.5)*cov+0.5;}
void main(){
  float disp=0.45+uHover*1.05;
  vec2 cVuv=vUv-0.5;
  float outCircle=(0.5-length(cVuv))*(TS*10.0);
  vec2 n=vUv-0.5;
  float baseScale=1.0+0.5*disp-(1.0-outCircle)*disp*0.5;
  n*=baseScale;n+=0.5;
  vec2 bdir=(n-0.5)/max(length(n-0.5),1e-4);
  float ca=uHover*0.005;
  vec3 col=vec3(
    texture2D(uTex,fit(n+bdir*ca,uCov)).r,
    texture2D(uTex,fit(n,uCov)).g,
    texture2D(uTex,fit(n-bdir*ca,uCov)).b);
  float r=length(vUv-0.5);
  col*=mix(0.6,0.98,uHover);
  col*=1.0-0.4*smoothstep(0.55,1.15,r);
  gl_FragColor=vec4(col*uAlpha,1.0);
}`;
function sh(t,s){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);return o;}
const prog=gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,VS));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);
const quad=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,quad);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([0,0,1,0,0,1,0,1,1,0,1,1]),gl.STATIC_DRAW);
const aUV=gl.getAttribLocation(prog,'aUV');gl.enableVertexAttribArray(aUV);
gl.vertexAttribPointer(aUV,2,gl.FLOAT,false,0,0);
const uRect=gl.getUniformLocation(prog,'uRect'),uCov=gl.getUniformLocation(prog,'uCov'),
      uHover=gl.getUniformLocation(prog,'uHover'),uAlpha=gl.getUniformLocation(prog,'uAlpha');

const texCache={};
function getTex(url){
  if(texCache[url])return texCache[url];
  const t={tex:gl.createTexture(),asp:1.5};
  gl.bindTexture(gl.TEXTURE_2D,t.tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,1,1,0,gl.RGBA,gl.UNSIGNED_BYTE,new Uint8Array([18,18,18,255]));
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  const im=new Image();
  im.onload=()=>{gl.bindTexture(gl.TEXTURE_2D,t.tex);gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,im);t.asp=im.naturalWidth/im.naturalHeight;};
  im.src=url;texCache[url]=t;return t;
}

let list=[], tiles=[], hoverIdx=-1, zoomIdx=-1, zoomT=0;
const ease=t=>t*t*(3-2*t);
function layout(cat){
  list=P.filter(p=>p.cat===cat);
  list.forEach(p=>p.t=getTex(p.img));
  const n=list.length, cols=Math.max(3,Math.round(Math.sqrt(n))), rows=Math.ceil(n/cols);
  const gap=14, mX=Math.max(36,innerWidth*0.06), topPad=64, botPad=78;
  let cw=(innerWidth-2*mX-gap*(cols-1))/cols, ch=cw/1.5;
  const maxH=innerHeight-topPad-botPad, gh0=rows*ch+gap*(rows-1);
  if(gh0>maxH){const s=maxH/gh0;cw*=s;ch*=s;}
  const gw=cols*cw+gap*(cols-1), gh=rows*ch+gap*(rows-1);
  const ox=(innerWidth-gw)/2, oy=topPad+(maxH-gh)/2;
  tiles=list.map((p,i)=>{const c=i%cols,r=Math.floor(i/cols);
    return {p,h:0,px:ox+c*(cw+gap),py:oy+r*(ch+gap),pw:cw,ph:ch};});
  hoverIdx=-1;zoomIdx=-1;zoomT=0;cap.style.opacity=0;
}
function clip(px,py,pw,ph){ // CSS px rect → clip-space vec4 (x,y bottom-left, w,h)
  return [px/innerWidth*2-1, 1-(py+ph)/innerHeight*2, pw/innerWidth*2, ph/innerHeight*2];
}
function cov(asp,pw,ph){const ta=pw/ph;return asp>ta?[ta/asp,1]:[1,asp/ta];}
function drawTile(t,hov,alpha,px,py,pw,ph){
  gl.uniform4fv(uRect,clip(px,py,pw,ph));
  gl.uniform2fv(uCov,cov(t.p.t.asp,pw,ph));
  gl.uniform1f(uHover,hov);gl.uniform1f(uAlpha,alpha);
  gl.bindTexture(gl.TEXTURE_2D,t.p.t.tex);
  gl.drawArrays(gl.TRIANGLES,0,6);
}
function frame(){
  const dpr=Math.min(2,devicePixelRatio||1);
  if(cv.width!==innerWidth*dpr){cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;gl.viewport(0,0,cv.width,cv.height);}
  gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);
  tiles.forEach((t,i)=>{const tgt=(i===hoverIdx&&zoomIdx<0)?1:0;t.h+=(tgt-t.h)*0.2;});
  if(zoomIdx>=0)zoomT+=(1-zoomT)*0.12;
  tiles.forEach((t,i)=>{ if(i===zoomIdx)return;
    drawTile(t,t.h, zoomIdx>=0?(1-zoomT):1, t.px,t.py,t.pw,t.ph);});
  if(zoomIdx>=0){const t=tiles[zoomIdx],e=ease(zoomT);
    const px=t.px*(1-e), py=t.py*(1-e), pw=t.pw+(innerWidth-t.pw)*e, ph=t.ph+(innerHeight-t.ph)*e;
    drawTile(t,1,1,px,py,pw,ph);}
  requestAnimationFrame(frame);
}

function hit(x,y){return tiles.findIndex(t=>x>=t.px&&x<=t.px+t.pw&&y>=t.py&&y<=t.py+t.ph);}
cv.addEventListener('mousemove',e=>{
  if(zoomIdx>=0)return;
  const i=hit(e.clientX,e.clientY);
  if(i!==hoverIdx){hoverIdx=i;cv.classList.toggle('hot',i>=0);
    if(i>=0){const t=tiles[i];cap.innerHTML=`${t.p.client}<span class="yr">${t.p.year}</span>`;
      cap.style.left=(t.px+t.pw/2)+'px';cap.style.top=(t.py+t.ph+8)+'px';cap.style.opacity=1;}
    else cap.style.opacity=0;}
});
cv.addEventListener('click',()=>{ if(hoverIdx<0||zoomIdx>=0)return;
  zoomIdx=hoverIdx;zoomT=0;cap.style.opacity=0;cv.classList.remove('hot');
  setTimeout(()=>{const f=document.getElementById('flash');f.classList.remove('go');void f.offsetWidth;f.classList.add('go');},620);
  setTimeout(()=>{zoomIdx=-1;zoomT=0;},1200);
});
document.querySelectorAll('.toggle button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.toggle button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');layout(b.dataset.cat);});
addEventListener('resize',()=>layout(document.querySelector('.toggle button.on').dataset.cat));
layout('Commercial');frame();
</script>
</body>
</html>
